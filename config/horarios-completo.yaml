  Martes:    { 1: {asig: Pro-C, aula: Aula 1}, 2: {asig: Pro-CP, aula: Aula 4}, 3: {asig: Pro-CP, aula: Aula 4} }
  Miércoles: { 1: {asig: A1-C,  aula: Aula 1}, 2: {asig: A1-C,   aula: Aula 1}, 3: {asig: A1-CP,  aula: Aula 4} }
