# Horario "completo" — copia fiel densa para estresar el generador.
# Usar con: python generar.py --config config/facultad-completa.yaml \
#                             --horarios config/horarios-completo.yaml \
#                             --salida propuesta-completa.xlsx
#
# Casos deliberados incluidos (para verlos resaltados al abrir el .xlsx):
#   * Conferencias COMPARTIDAS dentro del mismo año  -> celda de Aulas concatena varios grupos,
#     pintada con el color del año (sin conflicto).      Ej: Aula 1 / Lunes T1 -> C111,C112,C113
#   * CONFLICTO ENTRE AÑOS (MIX)                      -> dos años distintos en la misma aula/turno,
#     celda de Aulas en ROJO INTENSO.                    Ej: Aula 2 / Lunes T2 -> C111(C1)+M111(M1)
#   * SOBRE-PLANIFICACIÓN                             -> asignatura por encima de su frecuencia,
#     fila de la tabla en ROJO.                          Ej: C121 planifica AMI-CP 3 veces (frec 2)
#   * ASIGNATURA DESCONOCIDA                          -> id que no existe en el año, celda NARANJA.
#     (el cargador NO valida 'asig', así que pasa)       Ej: C121 usa XYZ-C
#   * Grupos "verdes"                                 -> planificados a su frecuencia exacta.
#
# Nota: no se puede meter un AULA inválida desde aquí (el cargador la rechaza); el resaltado
# amarillo de "aula inválida" solo se ve editando a mano una celda de aula en Excel.

# ======================= C1 — sesión 1 (verdes, confs compartidas en Aula 1) =======================

C111:   # prácticas en Aula 2
  Lunes:     { 1: {asig: AMI-C, aula: Aula 1}, 2: {asig: AMI-CP, aula: Aula 2}, 3: {asig: AMI-CP, aula: Aula 2} }
  Martes:    { 1: {asig: Pro-C, aula: Aula 1}, 2: {asig: Pro-CP, aula: Aula 2}, 3: {asig: Pro-CP, aula: Aula 2} }
  Miércoles: { 1: {asig: A1-C,  aula: Aula 1}, 2: {asig: A1-C,   aula: Aula 1}, 3: {asig: A1-CP,  aula: Aula 2} }
  Jueves:    { 1: {asig: F-C,   aula: Aula 1}, 2: {asig: F-CP,   aula: Aula 2} }
  Viernes:   { 1: {asig: EF,    aula: Lab 1} }

