          - { id: A2-CP,   nombre: "Álgebra II (C.P.)",             frecuencia: 1 }
          - { id: FMat-C,  nombre: "Física Matemática (Conf)",      frecuencia: 1 }
          - { id: EF,      nombre: "Educación Física",              frecuencia: 1 }
      3:
