# Facultad "completa" — escenario de estrés para el generador.
#
# A diferencia de config/facultad.yaml (solo carrera C, año 1), aquí están las 3
# carreras (C, M, D) con años 1-4. De esto se derivan ~22 grupos => 22 hojas de grupo,
# y las fórmulas de firma de año (hoja Datos) y de ocupación (hoja Aulas) crecen mucho
# (un COUNTIF/IF por grupo y por año en CADA celda). Es justo lo que "cuesta procesar".
#
# Recordatorio del convenio Casg: Carrera + Año + Sesión + Grupo. Solo C1 tiene 2 sesiones.

aulas: [Aula 1, Aula 2, Aula 3, Aula 4, Aula 5, Aula 6, Aula 7, Aula 8,
        Aula 9, Aula 10, Aula 11, Aula 12, Lab 1, Lab 2, Salón]
dias:   [Lunes, Martes, Miércoles, Jueves, Viernes]
turnos: 6

carreras:

  C:
    nombre: Ciencias de la Computación
    años:
      1:
        sesiones:
          1: { grupos: [1, 2, 3] }   # C111, C112, C113
          2: { grupos: [1, 2] }      # C121, C122
        asignaturas:
          - { id: AMI-C,  nombre: "Análisis Matemático I (Conf)",  frecuencia: 1 }
          - { id: AMI-CP, nombre: "Análisis Matemático I (C.P.)",  frecuencia: 2 }
          - { id: Pro-C,  nombre: "Programación (Conf)",           frecuencia: 1 }
          - { id: Pro-CP, nombre: "Programación (C.P.)",           frecuencia: 2 }
