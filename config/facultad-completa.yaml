          - { id: A1-CP,  nombre: "Álgebra I (C.P.)",              frecuencia: 1 }
          - { id: F-C,    nombre: "Filosofía (Conf)",              frecuencia: 1 }
          - { id: F-CP,   nombre: "Filosofía (C.P.)",              frecuencia: 1 }
          - { id: EF,     nombre: "Educación Física",              frecuencia: 1 }
      2:
        sesiones:
          1: { grupos: [1, 2] }      # C211, C212
        asignaturas:
